<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="../assets/mk.png" sizes="64x64">
  <title>DzharFinance - Register</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/register.css" />
</head>
<body>
  <main class="auth-page">
    <a href="../index.html" class="home-link" aria-label="Kembali ke homepage">← Home</a>
    <nav class="auth-nav" aria-label="Navigasi auth">
      <a href="../index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="register.html" class="active">Register</a>
    </nav>

    <section class="auth-container">
      <aside class="auth-left register-left">
        <img src="../assets/logooo.png" alt="DzharFinance Logo" class="auth-logo">
        <div class="illustration-wrap">
          <img src="../assets/kotonoo.png" alt="Ilustrasi register DzharFinance" class="auth-illustration kotono">
        </div>
        <div class="auth-copy">
          <span>Start Now</span>
          <h1>Buat akun dan mulai atur hidupmu dengan lebih rapi.</h1>
          <p>Daftar untuk mengakses fitur keuangan, reminder, cuaca, dan berita.</p>
        </div>
      </aside>

      <section class="auth-right">
        <div class="mobile-brand">
          <img src="../assets/logooo.png" alt="DzharFinance Logo">
        </div>

        <span class="auth-badge">Create Account</span>
        <h2>Sign-Up<br>DzharFinance</h2>
        <p class="auth-subtitle">Buat akun baru untuk mulai menggunakan DzharFinance.</p>

        <form id="registerForm">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter Your Email" required autocomplete="email" />

          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter Your Password" required autocomplete="new-password" />

          <button type="submit" id="registerBtn">Daftar</button>
        </form>

        <p class="register-link">
          Sudah punya akun? <a href="login.html"><b>Login di sini</b></a>
        </p>
      </section>
    </section>
  </main>

  <script src="../js/register.js"></script>
</body>
</html>
